<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP - Szymon Królikowski</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="searchBar">
        <img class="searchBar__icon" src="/image/pin.png">
        <input type="text" class="searchBar__input">
        <img class="searchBar__icon searchBar__searchIcon" src="/image/search.png">
    </div>

    <div class="mainInformation">
        <p class="mainInformation__city">Rio de Janeiro</p>
        <div class="mainInformation__weatherMainInformation">
            <p class="mainInformation__temperature">27</p>
            <p class="mainInformation__o">°</p>
            <div class="mainInformation__changeCF">
                <p class="mainInformation__celsius">C</p>
                <p class="mainInformation__fahrenheit">F</p>
            </div>
        </div>
        <p class="mainInformation__weather">Deszcz</p>
        <p class="mainInformation__time paragraph">Updated on 21:07</p>
    </div>

    <div class="statistics">
        <div class="statistics__box">
            <img class="statistics__image"src="/image/pressure.png" alt="">
            <p class="paragraph">Pressure</p>
            <p class="paragraphBold pressureParagraph">20 hPa</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/wind.png" alt="">
            <p class="paragraph">Wind</p>
            <p class="paragraphBold windParagraph">20 km/s</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/humidity.png" alt="">
            <p class="paragraph">Humidity</p>
            <p class="paragraphBold humidityParagraph">20 %</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/visibility.png" alt="">
            <p class="paragraph">Visibility</p>
            <p class="paragraphBold visibilityParagraph">20 %</p>
        </div>
    </div>

    <div class="todayStatistics">
        <div class="todayStatistics__top">
            <h2 class="headingTwo">Today</h2>
            <p class="paragraph currentDate">07.02.2023</p>
        </div>
        <div class="todayStatistics__bottomBox">
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">12:00</p>
                <img style="width: 35px; height: 30px" src="/image/clear.png">
                <p class="paragraph">-2</p>
            </div>
        </div>
    </div>
    
    <div class="dayInformationSection"></div>

    <script src="/js/main.js"></script>
</body>
</html>
