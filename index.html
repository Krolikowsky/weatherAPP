<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP - Szymon Królikowski</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="searchBar">
        <img class="searchBar__icon" src="/image/pin.png">
        <input type="text" class="searchBar__input">
        <img class="searchBar__icon" src="/image/search.png">
    </div>

    <div class="mainInformation">
        <p class="mainInformation__city">Rio de Janeiro</p>
        <div class="mainInformation__weatherMainInformation">
            <p class="mainInformation__temperature">27</p>
            <p class="mainInformation__o">°</p>
            <div class="mainInformation__changeCF">
                <p class="mainInformation__celsius">C</p>
                <p class="mainInformation__fahrenheit">F</p>
            </div>
        </div>
        <p class="mainInformation__weather">Deszcz</p>
        <p class="mainInformation__time paragraph">Zaktualizowano o 21:07</p>
    </div>

    <div class="statistics">
        <div class="statistics__box">
            <img class="statistics__image"src="/image/pressure.png" alt="">
            <p class="paragraph">Ciśnienie</p>
            <p class="paragraphBold">20 hPa</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/wind.png" alt="">
            <p class="paragraph">Wiatr</p>
            <p class="paragraphBold">20 km/s</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/humidity.png" alt="">
            <p class="paragraph">Wilgotność</p>
            <p class="paragraphBold">20 %</p>
        </div>
        <div class="statistics__box">
            <img class="statistics__image"src="/image/visibility.png" alt="">
            <p class="paragraph">Widoczność</p>
            <p class="paragraphBold">20 %</p>
        </div>
    </div>

    <div class="todayStatistics">
        <div class="todayStatistics__top">
            <h2 class="headingTwo">Dzisiaj</h2>
            <p class="paragraph">07.02.2023</p>
        </div>
        <div class="todayStatistics__bottomBox">
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">12:00</p>
                <img src="/image/rain.png">
                <p class="paragraph">19°C</p>
            </div>
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">15:00</p>
                <img src="/image/rain.png">
                <p class="paragraph">17°C</p>
            </div>
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">18:00</p>
                <img src="/image/storm.png">
                <p class="paragraph">20°C</p>
            </div>
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">21:00</p>
                <img src="/image/rain.png">
                <p class="paragraph">16°C</p>
            </div>
            <div class="todayStatistics__weatherBox">
                <p class="paragraph">15:00</p>
                <img src="/image/storm.png">
                <p class="paragraph">15°C</p>
            </div>
        </div>
    </div>
</body>
</html>
