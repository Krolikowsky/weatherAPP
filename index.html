<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP - Szymon Królikowski</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <script src="/js/main.js"></script>
    <section class="mainInformation">
        <h1 class="headingOne mainInformation__city">Poznań</h1>
        <div class="mainInformation__weatherBox">
            <!-- <img class="mainInformation__weatherIcon" src="/image/smoke.png"> -->
            <p class="paragraph mainInformation__mainTemperature">6<span class="mainInformation__degree">°</span></p>
            <div class="mainInformation__chooseScaleBox">
                <p class="paragraph mainInformation__celsius">C</p>
                <p class="paragraph mainInformation__fahrenheit">F</p>
            </div>
        </div>
        <h2 class="headingTwo mainInformation__descriptionWeather">Zachmurzenie całkowite</h2>
        <p class="paragraph mainInformation__time">Zaktualizowano o godzinie 13:48</p>
        <div class="mainInformation__accurateWeatherInformation">
            <p class="paragraph">Temperatura minimalna 1°</p>
            <p class="paragraph">Wiatr 31km/h</p>
            <p class="paragraph">Widoczność 10km</p>
            <p class="paragraph">Ciśnienie 100hPa</p>
            <p class="paragraph">Wilgotność 48%</p>
            <p class="paragraph">Temperatura minimalna 2°</p>
        </div>
    </section>

    <section class="hoursSection">
        <h2 class="headingTwo">Godzinowa</h2>
        <div class="hoursSection__slider">
            <div class="hoursSection__slide">
                <img class="hoursSection__icon" src="/image/clouds.png">
                <p class="hoursSection__temperature">6°</p>
                <p class="hoursSection__informationParagraph">Przeważnie bezchmurnie</p>
                <p class="hoursSection__humidity"><img class="hoursSection__smallIcon" src="/image/drop-icon.png"/> 0%</p>
                <p class="hoursSection__wind"><img class="hoursSection__smallIcon" src="/image/wind-direction.png"/>23km/h</p>
                <p class="hoursSection__hour">18:00</p>
            </div>

            <div class="hoursSection__slide">
                <img class="hoursSection__icon" src="/image/clouds.png">
                <p class="hoursSection__temperature">6°</p>
                <p class="hoursSection__informationParagraph">Przeważnie bezchmurnie</p>
                <p class="hoursSection__humidity"><img class="hoursSection__smallIcon" src="/image/drop-icon.png"/> 0%</p>
                <p class="hoursSection__wind"><img class="hoursSection__smallIcon" src="/image/wind-direction.png"/>23km/h</p>
                <p class="hoursSection__hour">18:00</p>
            </div>
        </div>
    </section>
</body>
</html>
